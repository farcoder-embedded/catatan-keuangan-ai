name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build APK
        run: gradle assembleDebug

      - name: Show debug certificate SHA-1
        continue-on-error: true
        run: |
          if [ -f "$HOME/.android/debug.keystore" ]; then
            keytool -list -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android | grep -E "SHA1|SHA-1" || true
          else
            echo "Debug keystore was not found. APK upload will continue."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: catatan-keuangan-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
